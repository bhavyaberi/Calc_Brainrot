<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" readonly aria-label="Calculator Display">

        <div class="top-row">
            <button onclick="clearDisplay()" class="gray" aria-label="Clear">C</button>
            <button onclick="backspace()" class="gray" aria-label="Backspace">⌫</button>
        </div>


        <div class="button">
            <button onclick="addValue('1')" aria-label="1">1</button>
            <button onclick="addValue('2')" aria-label="2">2</button>
            <button onclick="addValue('3')" aria-label="3">3</button>
            <button onclick="addValue('+')" class="op" aria-label="Plus">+</button>

            <button onclick="addValue('4')" aria-label="4">4</button>
            <button onclick="addValue('5')" aria-label="5">5</button>
            <button onclick="addValue('6')" aria-label="6">6</button>
            <button onclick="addValue('-')" class="op" aria-label="Minus">-</button>

            <button onclick="addValue('7')" aria-label="7">7</button>
            <button onclick="addValue('8')" aria-label="8">8</button>
            <button onclick="addValue('9')" aria-label="9">9</button>
            <button onclick="addValue('*')" class="op" aria-label="Multiply">*</button>

            <button onclick="addValue('0')" aria-label="0">0</button>
            <button onclick="addValue('.')" aria-label="Decimal point">.</button>

            <button onclick="percentage('%')" class="op" aria-label="Percentage">%</button>
            <button onclick="addValue('/')" class="op" aria-label="Divide">/</button>

        </div>

        <button id="equal" aria-label="Equals">=</button>

    </div>

    <script src="event.js"></script>

</body>

</html>
